name: Bug report
description: Reporta un error reproducible
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Gracias por reportar. Incluye pasos claros y evidencia para acelerar el diagnostico.

  - type: textarea
    id: summary
    attributes:
      label: Resumen
      description: Que problema observaste.
      placeholder: La app falla al iniciar en modo CLI...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      description: Lista exacta de pasos.
      placeholder: |
        1. Ejecutar `python app.py --cli`
        2. Abrir navegador
        3. Presionar Iniciar escucha
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Resultado esperado
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Resultado actual
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Tag o commit (ej. v0.0.1 o SHA)
      placeholder: v0.0.1
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Sistema operativo
      options:
        - Windows 11
        - Windows 10
        - macOS
        - Linux
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs relevantes
      description: Pega extracto de `alberttranslator.log` sin secretos.
      render: shell
    validations:
      required: false
